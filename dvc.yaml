# DVC pipeline contract:
# - Each stage should own unique output paths.
# - Avoid writing files inside directories that are outputs of other stages.
stages:
  extract_dataset:
    # This stage needs data/raw/train.zip and data/raw/test.zip.
    # It is frozen so repro can use cached extracted outputs when raw zips are absent.
    # Unfreeze with: dvc unfreeze extract_dataset (after adding the zip files).
    frozen: true
    cmd: .venv\Scripts\python.exe -m src.dataset extract-dataset
    deps:
      - src/dataset.py
      - data/raw
    outs:
      - data/processed/train
      - data/processed/test

  make_dataset:
    cmd: .venv\Scripts\python.exe -m src.dataset make-dataset
    deps:
      - src/dataset.py
      - data/processed/train/train.csv
      - params.yaml
    params:
      - make_dataset.test_size
      - make_dataset.random_state
    outs:
      - data/interim

  modify_features:
    cmd: .venv\Scripts\python.exe -m src.features modify data/interim/train.csv data/interim/val.csv data/processed/test/test.csv
    deps:
      - src/features.py
      - data/interim/train.csv
      - data/interim/val.csv
      - data/processed/test/test.csv
    outs:
      - data/processed/transformations

  build_features:
    cmd: .venv\Scripts\python.exe -m src.features build data/processed/transformations/train.csv data/processed/transformations/val.csv data/processed/transformations/test.csv
    deps:
      - src/features.py
      - data/processed/transformations/train.csv
      - data/processed/transformations/val.csv
      - data/processed/transformations/test.csv
    outs:
      - data/processed/build-features

  data_preprocessing:
    cmd: .venv\Scripts\python.exe -m src.features preprocess train.csv val.csv test.csv
    deps:
      - src/features.py
      - params.yaml
      - data/processed/build-features/train.csv
      - data/processed/build-features/val.csv
      - data/processed/build-features/test.csv
    params:
      - data_preprocessing.percentiles
    outs:
      - data/processed/final
      - models/transformers

  train_model:
    cmd: .venv\Scripts\python.exe -m src.modeling.train
    deps:
      - src/modeling/train.py
      - params.yaml
      - data/processed/final/train.csv
    params:
      - train_model.xgb_regressor.n_estimators
      - train_model.xgb_regressor.n_jobs
      - train_model.xgb_regressor.max_depth
      - train_model.xgb_regressor.verbosity
    outs:
      - models/models

  predict_model:
    # Write predictions to data/processed (existing parent) to avoid overlap with
    # extract_dataset output directory data/processed/test.
    cmd: .venv\Scripts\python.exe -m src.modeling.predict --predictions-path data/processed
    deps:
      - src/modeling/predict.py
      - data/processed/final/val.csv
      - data/processed/final/test.csv
      - models/models/xgbreg.joblib
    outs:
      - data/processed/test_predictions.csv

  plot_results:
    cmd: .venv\Scripts\python.exe -m src.plots main --input-path data/processed/final/val.csv --output-path plots/val_plot.png
    deps:
      - src/plots.py
      - data/processed/final/val.csv
    outs:
      # Track only the produced plot file instead of the whole directory.
      - plots/val_plot.png
